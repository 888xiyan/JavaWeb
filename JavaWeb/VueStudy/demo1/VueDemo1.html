<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Vue Demo</title>
    <!--Vue.js快速入门 -->
</head>
<body>
    <div id="app">
        <!-- 插值语法 -->
        <h1>{{ message }}</h1>
    </div>
    <footer>
        <!-- 格式化编程 -->
        <script type="module">
            // 使用ES Module 引入Vue
            import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
            createApp({
                data(){
                    return{
                        message: 'Hello Vue!'
                    }
                }
            }

            ).mount('#app')// 使用范围,ID
        </script>
    </footer>
</body>
</html>
